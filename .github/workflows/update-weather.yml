name: TRMNL Serverless Hack

on:
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Puppeteer
        run: npm install puppeteer

      - name: Gerar HTML e Screenshot (PNG)
        run: node build.mjs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Pillow e Converter para BMP
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('screen.png').convert('1').save('image.bmp')"

      - name: Gerar API JSON
        run: |
          mkdir -p api
          VERSION=$(date +%Y%m%d%H%M)

          # 1. API de Display — URL versionado força o TRMNL a descarregar imagem nova
          cat > api/display << EOF
          {
            "status": 0,
            "image_url": "https://whysoseriusbro.github.io/meu-clima/image.bmp?v=${VERSION}",
            "filename": "image.bmp",
            "refresh_rate": 1800,
            "reset_firmware": false,
            "update_firmware": false,
            "firmware_url": null,
            "special_function": "sleep"
          }
          EOF

          # 2. API de Registo (Setup) - MUITO IMPORTANTE para o primeiro arranque!
          cat > api/setup << EOF
          {
            "api_key": "12345678-1234-1234-1234-123456789012",
            "friendly_id": "MEU-CLIMA",
            "image_url": "https://whysoseriusbro.github.io/meu-clima/image.bmp?v=${VERSION}",
            "message": "Welcome!"
          }
          EOF

      - name: Fazer Commit e Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html screen.png image.bmp api/display api/setup
          git commit -m "chore: atualiza imagem TRMNL" || echo "Sem mudanças para commitar"
          git push
